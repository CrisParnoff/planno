name: Rollover de segunda

# Segunda 00h01 no horário de Brasília (UTC-3). 00h01 BRT = 03h01 UTC.
on:
  schedule:
    - cron: "1 3 * * 1"
  workflow_dispatch: {}

jobs:
  rollover:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar endpoint de rollover de segunda
        run: |
          code=$(curl -s -o /tmp/out.json -w "%{http_code}" \
            -X POST "${{ secrets.BACKEND_URL }}/internal/cron/rollover-monday" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}")
          echo "HTTP $code"
          cat /tmp/out.json
          test "$code" = "200"
